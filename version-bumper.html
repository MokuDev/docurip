<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>docurip Version Bumper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 2rem;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      color: #4ade80;
    }

    .step {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .step h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: #94a3b8;
    }

    button {
      background: #4ade80;
      color: #0f172a;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 0.5rem;
      margin-top: 0.5rem;
    }

    button:hover:not(:disabled) {
      background: #22c55e;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input[type="text"] {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 0.5rem;
      border-radius: 4px;
      width: 200px;
      font-size: 1rem;
      margin-right: 0.5rem;
    }

    input[type="checkbox"] {
      margin-right: 0.5rem;
    }

    label {
      display: block;
      margin: 0.5rem 0;
    }

    .current-version {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #94a3b8;
    }

    #currentVersion {
      color: #4ade80;
      font-weight: bold;
      font-family: monospace;
    }

    .preview-file {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 1rem;
      margin: 0.5rem 0;
      font-family: monospace;
      font-size: 0.85rem;
    }

    .preview-file h3 {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    .diff-line {
      display: block;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
    }

    .diff-remove {
      background: #7f1d1d;
      color: #fca5a5;
    }

    .diff-add {
      background: #14532d;
      color: #86efac;
    }

    #commandBlock {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 1rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #statusMessage {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 4px;
      display: none;
    }

    #statusMessage.success {
      background: #14532d;
      color: #86efac;
      display: block;
    }

    #statusMessage.error {
      background: #7f1d1d;
      color: #fca5a5;
      display: block;
    }

    #folderName {
      margin-left: 1rem;
      color: #4ade80;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 docurip Version Bumper</h1>

    <section class="step">
      <h2>1. Projektordner wählen</h2>
      <button id="pickFolderBtn">📁 Ordner auswählen</button>
      <span id="folderName"></span>
    </section>

    <section class="step" id="versionSection" style="display:none;">
      <h2>2. Version bumpen</h2>
      <div class="current-version">
        Aktuelle Version: <span id="currentVersion">-</span>
      </div>
      <label>Neue Version:</label>
      <input type="text" id="newVersion" placeholder="z.B. 0.3.0" />
      <button id="previewBtn">🔍 Preview</button>
      <button id="bumpBtn" disabled>✅ Bump!</button>
    </section>

    <section class="step" id="previewSection" style="display:none;">
      <h2>3. Preview</h2>
      <div id="previewContent"></div>
    </section>

    <section class="step" id="optionsSection" style="display:none;">
      <h2>4. Optionen</h2>
      <label><input type="checkbox" id="gitCommitCheck" /> Git-Commit erstellen</label>
      <label><input type="checkbox" id="buildReleaseCheck" /> Build + Release ausführen</label>
      <div id="commandOutput" style="display:none;">
        <h3>Auszuführende Commands:</h3>
        <pre id="commandBlock"></pre>
        <button id="copyCommandsBtn">📋 Kopieren</button>
      </div>
    </section>

    <section class="step" id="fallbackSection" style="display:none;">
      <h2>Browser nicht unterstützt</h2>
      <p>Dein Browser unterstützt das Dateisystem nicht direkt. Bitte lade die 4 Dateien hoch:</p>
      <input type="file" id="fallbackFiles" multiple accept=".json,.toml,.tsx" />
      <div id="fallbackOutput"></div>
    </section>

    <div id="statusMessage"></div>
  </div>

  <script>
    // JavaScript will be added in subsequent tasks
  </script>
</body>
</html>
